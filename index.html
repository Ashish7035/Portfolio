<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Website Under Maintenance</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Poppins', sans-serif;
    }

    body {
        height: 100vh;
        overflow: hidden;
        background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364, #1c1c1c);
        background-size: 400% 400%;
        animation: gradientMove 10s ease infinite;
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        text-align: center;
    }

    @keyframes gradientMove {
        0% {background-position: 0% 50%;}
        50% {background-position: 100% 50%;}
        100% {background-position: 0% 50%;}
    }

    .container {
        z-index: 2;
        max-width: 600px;
        padding: 20px;
    }

    h1 {
        font-size: 3rem;
        margin-bottom: 10px;
        text-transform: uppercase;
        letter-spacing: 3px;
        animation: glow 2s ease-in-out infinite alternate;
    }

    @keyframes glow {
        from {
            text-shadow: 0 0 10px #00c6ff, 0 0 20px #0072ff;
        }
        to {
            text-shadow: 0 0 20px #00c6ff, 0 0 40px #0072ff;
        }
    }

    p {
        opacity: 0.8;
        margin-bottom: 25px;
        line-height: 1.6;
    }

    .progress-container {
        width: 100%;
        height: 8px;
        background: rgba(255,255,255,0.2);
        border-radius: 10px;
        overflow: hidden;
        margin-bottom: 20px;
    }

    .progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #00c6ff, #0072ff);
        animation: loading 5s infinite;
    }

    @keyframes loading {
        0% { width: 0%; }
        50% { width: 80%; }
        100% { width: 0%; }
    }

    .clock {
        font-size: 1.2rem;
        margin-top: 10px;
        opacity: 0.7;
    }

    /* Floating particles */
    .particle {
        position: absolute;
        width: 5px;
        height: 5px;
        background: white;
        border-radius: 50%;
        opacity: 0.5;
        animation: float linear infinite;
    }

    @keyframes float {
        from {
            transform: translateY(100vh) scale(0);
        }
        to {
            transform: translateY(-10vh) scale(1);
        }
    }

</style>
</head>

<body>

<div class="container">
    <h1>Under Maintenance</h1>
    <p>
        We're currently working on improving the website experience.<br>
        Please check back later. Thank you for your patience!
    </p>

    <div class="progress-container">
        <div class="progress-bar"></div>
    </div>

    <div class="clock" id="clock"></div>
</div>

<script>
    // Live Clock
    function updateClock() {
        const now = new Date();
        const time = now.toLocaleTimeString();
        document.getElementById("clock").innerText = "Current Time: " + time;
    }
    setInterval(updateClock, 1000);
    updateClock();

    // Generate particles
    function createParticles() {
        for (let i = 0; i < 40; i++) {
            let particle = document.createElement("div");
            particle.classList.add("particle");

            particle.style.left = Math.random() * 100 + "vw";
            particle.style.animationDuration = (Math.random() * 5 + 5) + "s";
            particle.style.opacity = Math.random();

            document.body.appendChild(particle);
        }
    }
    createParticles();
</script>

</body>
</html>
